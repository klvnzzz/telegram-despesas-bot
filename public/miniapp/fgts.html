<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atualizar FGTS</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1c1c1e;
    --muted: #6b6b6f;
    --border: #e2e2e4;
    --accent: #2f80ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
  }
  #valor-atual {
    font-size: 13px;
    color: var(--muted);
    background: #f5f5f6;
    border-radius: 8px;
    padding: 10px 12px;
  }
  #btn-salvar {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
  }
  #btn-salvar:disabled { opacity: 0.5; }
  #mensagem { font-size: 13px; margin-top: 10px; text-align: center; }
  #mensagem.erro { color: #d64545; }
  #mensagem.sucesso { color: #2e9e5b; }
  .overlay-confirmacao {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .overlay-confirmacao.ativo { display: flex; }
  .card-confirmacao {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }
  .icone-sucesso {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #2e9e5b;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .icone-sucesso svg { width: 30px; height: 30px; }
  .card-confirmacao p {
    font-size: 15px;
    color: var(--text);
    margin: 0 0 20px;
    line-height: 1.4;
  }
  #btn-ok-confirmacao {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>Atualizar FGTS</h1>

<form id="form-fgts">
  <label for="valorAtualizado">Novo valor atualizado</label>
  <input type="text" inputmode="numeric" id="valorAtualizado" value="R$ 0,00" required />

  <button type="submit" id="btn-salvar">Atualizar FGTS</button>
  <p id="mensagem"></p>
</form>

<div class="overlay-confirmacao" id="overlay-confirmacao">
  <div class="card-confirmacao">
    <div class="icone-sucesso">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <p id="texto-confirmacao"></p>
    <button id="btn-ok-confirmacao">Ok</button>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const overlayConfirmacao = document.getElementById("overlay-confirmacao");
  const textoConfirmacao = document.getElementById("texto-confirmacao");

  function mostrarConfirmacao(texto) {
    textoConfirmacao.textContent = texto;
    overlayConfirmacao.classList.add("ativo");
  }

  document.getElementById("btn-ok-confirmacao").addEventListener("click", () => {
    if (tg) tg.close();
    else overlayConfirmacao.classList.remove("ativo");
  });

  const campoValor = document.getElementById("valorAtualizado");
  function formatarMoeda(digitos) {
    const centavos = parseInt(digitos || "0", 10);
    return (centavos / 100).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  }
  function valorEmCentavos(texto) {
    return parseInt((texto.match(/\d/g) || ["0"]).join(""), 10);
  }
  campoValor.addEventListener("input", () => {
    const digitos = campoValor.value.replace(/\D/g, "");
    campoValor.value = formatarMoeda(digitos);
  });

  const form = document.getElementById("form-fgts");
  const btn = document.getElementById("btn-salvar");
  const mensagem = document.getElementById("mensagem");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true;
    mensagem.textContent = "";
    mensagem.className = "";

    try {
      const payload = { valorAtualizado: valorEmCentavos(campoValor.value) / 100 };

      const resp = await fetch("/api/fgts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!resp.ok) throw new Error("Falha ao salvar.");

      mostrarConfirmacao("FGTS atualizado.");
      btn.disabled = false;
    } catch (err) {
      mensagem.textContent = err.message || "Erro ao atualizar o FGTS.";
      mensagem.className = "erro";
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
