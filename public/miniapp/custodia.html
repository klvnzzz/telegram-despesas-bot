<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova custódia</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1c1c1e;
    --muted: #6b6b6f;
    --border: #e2e2e4;
    --accent: #2f80ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
  }
  .bloco {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .bloco-cabecalho {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bloco-titulo { font-size: 14px; font-weight: 600; }
  .btn-remover-bloco {
    width: auto;
    background: none;
    border: none;
    color: #d64545;
    font-size: 13px;
    padding: 0;
  }
  #btn-adicionar {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    background: none;
    border: 1px dashed var(--accent);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  #btn-salvar {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
  }
  #btn-salvar:disabled { opacity: 0.5; }
  #mensagem { font-size: 13px; margin-top: 10px; text-align: center; }
  #mensagem.erro { color: #d64545; }
  #mensagem.sucesso { color: #2e9e5b; }
</style>
</head>
<body>

<h1>Nova custódia</h1>

<form id="form-custodia">
  <div id="blocos"></div>
  <button type="button" id="btn-adicionar">+ Adicionar outra custódia</button>
  <button type="submit" id="btn-salvar">Salvar custódia(s)</button>
  <p id="mensagem"></p>
</form>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const OPCAO_OUTRO = "Outro";

  let opcoesGlobais = null;
  async function garantirOpcoes() {
    if (!opcoesGlobais) {
      const resp = await fetch("/api/opcoes");
      opcoesGlobais = await resp.json();
    }
    return opcoesGlobais;
  }

  function preencherSelect(select, lista, inputNovo, placeholder = null) {
    select.innerHTML = "";

    if (placeholder) {
      const optPlaceholder = document.createElement("option");
      optPlaceholder.value = "";
      optPlaceholder.textContent = placeholder;
      optPlaceholder.disabled = true;
      optPlaceholder.selected = true;
      optPlaceholder.hidden = true;
      select.appendChild(optPlaceholder);
    }

    for (const item of lista) {
      const opt = document.createElement("option");
      opt.value = item;
      opt.textContent = item;
      select.appendChild(opt);
    }
    const optOutro = document.createElement("option");
    optOutro.value = OPCAO_OUTRO;
    optOutro.textContent = "Outro...";
    select.appendChild(optOutro);

    select.addEventListener("change", () => {
      inputNovo.style.display = select.value === OPCAO_OUTRO ? "block" : "none";
    });
  }

  function resolverValorCampo(select, inputNovo) {
    if (select.value !== OPCAO_OUTRO) return { valor: select.value, novaOpcao: null };

    const novoValor = inputNovo.value.trim();
    if (!novoValor) throw new Error("Preencha o novo valor antes de salvar.");

    return { valor: novoValor, novaOpcao: novoValor };
  }

  const blocosContainer = document.getElementById("blocos");
  let blocos = [];
  let contadorBlocos = 0;

  async function criarBloco() {
    contadorBlocos++;
    const numero = contadorBlocos;

    const raiz = document.createElement("div");
    raiz.className = "bloco";
    raiz.innerHTML = `
      <div class="bloco-cabecalho">
        <span class="bloco-titulo">Custódia ${numero}</span>
        <button type="button" class="btn-remover-bloco">Remover</button>
      </div>

      <label>Descrição</label>
      <select class="c-descricao" required></select>
      <input type="text" class="c-descricao-novo" placeholder="Digite a nova descrição" style="display:none; margin-top:8px;" />

      <label>Instituição</label>
      <select class="c-instituicao" required></select>
      <input type="text" class="c-instituicao-novo" placeholder="Digite a nova instituição" style="display:none; margin-top:8px;" />

      <label>Data</label>
      <input type="date" class="c-data" required />

      <label>Valor</label>
      <input type="text" class="c-valor" inputmode="numeric" value="R$ 0,00" required />
    `;

    const campoValor = raiz.querySelector(".c-valor");
    function formatarMoeda(digitos) {
      const centavos = parseInt(digitos || "0", 10);
      return (centavos / 100).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }
    function valorEmCentavos(texto) {
      return parseInt((texto.match(/\d/g) || ["0"]).join(""), 10);
    }
    campoValor.addEventListener("input", () => {
      const digitos = campoValor.value.replace(/\D/g, "");
      campoValor.value = formatarMoeda(digitos);
    });

    raiz.querySelector(".c-data").value = new Date().toISOString().slice(0, 10);

    const opcoes = await garantirOpcoes();
    preencherSelect(raiz.querySelector(".c-descricao"), opcoes.custodia, raiz.querySelector(".c-descricao-novo"), "Selecione uma descrição");
    preencherSelect(raiz.querySelector(".c-instituicao"), opcoes.instituicao, raiz.querySelector(".c-instituicao-novo"), "Selecione uma instituição");

    raiz.querySelector(".btn-remover-bloco").addEventListener("click", () => {
      if (blocos.length <= 1) return;
      blocos = blocos.filter((b) => b.raiz !== raiz);
      raiz.remove();
      renumerarBlocos();
    });

    const objetoBloco = {
      raiz,
      obterPayload: () => {
        const { valor: descricao, novaOpcao: novaDescricao } = resolverValorCampo(raiz.querySelector(".c-descricao"), raiz.querySelector(".c-descricao-novo"));
        const { valor: instituicao, novaOpcao: novaInstituicao } = resolverValorCampo(raiz.querySelector(".c-instituicao"), raiz.querySelector(".c-instituicao-novo"));

        const valorNumerico = valorEmCentavos(campoValor.value) / 100;
        if (!valorNumerico) throw new Error(`O valor da "Custódia ${raiz.querySelector(".bloco-titulo").textContent.replace("Custódia ", "")}" não pode ser zero.`);

        const novasOpcoes = [];
        if (novaDescricao) novasOpcoes.push({ campo: "custodia", valor: novaDescricao });
        if (novaInstituicao) novasOpcoes.push({ campo: "instituicao", valor: novaInstituicao });

        return {
          novasOpcoes,
          payload: {
            descricao,
            instituicao,
            data: raiz.querySelector(".c-data").value,
            valor: valorNumerico,
          },
        };
      },
    };

    blocos.push(objetoBloco);
    blocosContainer.appendChild(raiz);
  }

  function renumerarBlocos() {
    blocos.forEach((b, i) => {
      b.raiz.querySelector(".bloco-titulo").textContent = `Custódia ${i + 1}`;
    });
    contadorBlocos = blocos.length;
  }

  document.getElementById("btn-adicionar").addEventListener("click", () => criarBloco());
  criarBloco();

  const form = document.getElementById("form-custodia");
  const btn = document.getElementById("btn-salvar");
  const mensagem = document.getElementById("mensagem");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true;
    mensagem.textContent = "";
    mensagem.className = "";

    try {
      let salvas = 0;
      for (const bloco of blocos) {
        const { payload, novasOpcoes } = bloco.obterPayload();

        const resp = await fetch("/api/custodia", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!resp.ok) {
          let msg = `Falha ao salvar a custódia ${salvas + 1}.`;
          try { const dados = await resp.json(); if (dados.erro) msg = dados.erro; } catch {}
          throw new Error(msg);
        }

        for (const nova of novasOpcoes) {
          await fetch("/api/opcoes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nova),
          });
        }

        salvas++;
      }

      mensagem.textContent = salvas > 1 ? `${salvas} custódias registradas na planilha ✓` : "Custódia registrada na planilha ✓";
      mensagem.className = "sucesso";

      setTimeout(() => { if (tg) tg.close(); }, 1200);
    } catch (err) {
      mensagem.textContent = err.message || "Erro ao salvar as custódias.";
      mensagem.className = "erro";
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
