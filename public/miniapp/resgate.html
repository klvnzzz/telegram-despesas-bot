<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Novo resgate</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1c1c1e;
    --muted: #6b6b6f;
    --border: #e2e2e4;
    --accent: #2f80ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
  }
  #btn-salvar {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
  }
  #btn-salvar:disabled { opacity: 0.5; }
  #mensagem { font-size: 13px; margin-top: 10px; text-align: center; }
  #mensagem.erro { color: #d64545; }
  #mensagem.sucesso { color: #2e9e5b; }
</style>
</head>
<body>

<h1>Novo resgate</h1>

<form id="form-resgate">
  <label for="aplicacao">Aplicação</label>
  <select id="aplicacao" required></select>

  <label for="dataResgate">Data de resgate</label>
  <input type="date" id="dataResgate" required />

  <label for="valorResgate">Valor do resgate</label>
  <input type="text" inputmode="numeric" id="valorResgate" value="R$ 0,00" required />

  <button type="submit" id="btn-salvar">Salvar resgate</button>
  <p id="mensagem"></p>
</form>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const campoValor = document.getElementById("valorResgate");
  function formatarMoeda(digitos) {
    const centavos = parseInt(digitos || "0", 10);
    return (centavos / 100).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  }
  function valorEmCentavos(texto) {
    return parseInt((texto.match(/\d/g) || ["0"]).join(""), 10);
  }
  campoValor.addEventListener("input", () => {
    const digitos = campoValor.value.replace(/\D/g, "");
    campoValor.value = formatarMoeda(digitos);
  });

  document.getElementById("dataResgate").value = new Date().toISOString().slice(0, 10);

  async function carregarAplicacoes() {
    const select = document.getElementById("aplicacao");
    select.innerHTML = "";

    const optPlaceholder = document.createElement("option");
    optPlaceholder.value = "";
    optPlaceholder.textContent = "Selecione uma aplicação";
    optPlaceholder.disabled = true;
    optPlaceholder.selected = true;
    optPlaceholder.hidden = true;
    select.appendChild(optPlaceholder);

    try {
      const resp = await fetch("/api/aplicacoes");
      const aplicacoes = await resp.json();

      if (!aplicacoes.length) {
        const optVazia = document.createElement("option");
        optVazia.value = "";
        optVazia.textContent = "Nenhuma aplicação encontrada";
        optVazia.disabled = true;
        select.appendChild(optVazia);
        return;
      }

      for (const item of aplicacoes) {
        const opt = document.createElement("option");
        opt.value = item.codigo;
        opt.textContent = item.label;
        select.appendChild(opt);
      }
    } catch {
      const optErro = document.createElement("option");
      optErro.value = "";
      optErro.textContent = "Erro ao carregar aplicações";
      optErro.disabled = true;
      select.appendChild(optErro);
    }
  }
  carregarAplicacoes();

  const form = document.getElementById("form-resgate");
  const btn = document.getElementById("btn-salvar");
  const mensagem = document.getElementById("mensagem");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true;
    mensagem.textContent = "";
    mensagem.className = "";

    try {
      const payload = {
        codigoAplicacao: document.getElementById("aplicacao").value,
        dataResgate: document.getElementById("dataResgate").value,
        valorResgate: valorEmCentavos(campoValor.value) / 100,
      };

      const resp = await fetch("/api/resgate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!resp.ok) throw new Error("Falha ao salvar.");

      mensagem.textContent = "Resgate registrado na planilha ✓";
      mensagem.className = "sucesso";

      setTimeout(() => { if (tg) tg.close(); }, 1200);
    } catch (err) {
      mensagem.textContent = err.message || "Erro ao salvar o resgate.";
      mensagem.className = "erro";
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
