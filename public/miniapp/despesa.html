<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova despesa</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1c1c1e;
    --muted: #6b6b6f;
    --border: #e2e2e4;
    --accent: #2f80ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
  }
  .linha-dupla { display: flex; gap: 8px; }
  .linha-dupla > div { flex: 1; }
  .bloco {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .bloco-cabecalho {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .bloco-titulo { font-size: 14px; font-weight: 600; }
  .btn-remover-bloco {
    width: auto;
    background: none;
    border: none;
    color: #d64545;
    font-size: 13px;
    padding: 0;
  }
  #btn-adicionar {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    background: none;
    border: 1px dashed var(--accent);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  #btn-salvar {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
  }
  #btn-salvar:disabled { opacity: 0.5; }
  #mensagem { font-size: 13px; margin-top: 10px; text-align: center; }
  #mensagem.erro { color: #d64545; }
  #mensagem.sucesso { color: #2e9e5b; }
  .overlay-confirmacao {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .overlay-confirmacao.ativo { display: flex; }
  .card-confirmacao {
    background: #fff;
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }
  .icone-sucesso {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #2e9e5b;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .icone-sucesso svg { width: 30px; height: 30px; }
  .card-confirmacao p {
    font-size: 15px;
    color: var(--text);
    margin: 0 0 20px;
    line-height: 1.4;
  }
  #btn-ok-confirmacao {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>Nova despesa</h1>

<form id="form-despesa">
  <div id="blocos"></div>
  <button type="button" id="btn-adicionar">+ Adicionar outra despesa</button>
  <button type="submit" id="btn-salvar">Salvar despesa(s)</button>
  <p id="mensagem"></p>
</form>

<div class="overlay-confirmacao" id="overlay-confirmacao">
  <div class="card-confirmacao">
    <div class="icone-sucesso">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <p id="texto-confirmacao"></p>
    <button id="btn-ok-confirmacao">Ok</button>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const OPCAO_OUTRO = "Outro";
  const NOMES_MESES = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

  async function enviarNotificacaoTelegram(mensagem) {
    const chatId = tg?.initDataUnsafe?.user?.id;
    if (!chatId) return; // fora do Telegram (ex: teste no navegador), não tem como notificar
    try {
      await fetch("/api/notificar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chatId, mensagem }),
      });
    } catch {
      // Notificação é um "extra" — se falhar, não bloqueia o fluxo de salvar
    }
  }

  let opcoesGlobais = null;
  async function garantirOpcoes() {
    if (!opcoesGlobais) {
      const resp = await fetch("/api/opcoes");
      opcoesGlobais = await resp.json();
    }
    return opcoesGlobais;
  }

  function preencherSelect(select, lista, inputNovo, opcional = false, placeholder = null) {
    select.innerHTML = "";

    if (placeholder) {
      const optPlaceholder = document.createElement("option");
      optPlaceholder.value = "";
      optPlaceholder.textContent = placeholder;
      optPlaceholder.disabled = true;
      optPlaceholder.selected = true;
      optPlaceholder.hidden = true;
      select.appendChild(optPlaceholder);
    } else if (opcional) {
      const optVazia = document.createElement("option");
      optVazia.value = "";
      optVazia.textContent = "Nenhuma";
      select.appendChild(optVazia);
    }

    for (const item of lista) {
      const opt = document.createElement("option");
      opt.value = item;
      opt.textContent = item;
      select.appendChild(opt);
    }
    const optOutro = document.createElement("option");
    optOutro.value = OPCAO_OUTRO;
    optOutro.textContent = "Outro...";
    select.appendChild(optOutro);

    select.addEventListener("change", () => {
      inputNovo.style.display = select.value === OPCAO_OUTRO ? "block" : "none";
    });
  }

  // Não salva nada ainda: só resolve o valor e sinaliza se é uma categoria nova pra registrar depois
  function resolverValorCampo(select, inputNovo) {
    if (select.value !== OPCAO_OUTRO) return { valor: select.value, novaOpcao: null };

    const novoValor = inputNovo.value.trim();
    if (!novoValor) throw new Error("Preencha a nova categoria antes de salvar.");

    return { valor: novoValor, novaOpcao: novoValor };
  }

  const overlayConfirmacao = document.getElementById("overlay-confirmacao");
  const textoConfirmacao = document.getElementById("texto-confirmacao");

  function mostrarConfirmacao(texto) {
    textoConfirmacao.textContent = texto;
    overlayConfirmacao.classList.add("ativo");
  }

  document.getElementById("btn-ok-confirmacao").addEventListener("click", () => {
    if (tg) tg.close();
    else overlayConfirmacao.classList.remove("ativo");
  });

  const blocosContainer = document.getElementById("blocos");
  let blocos = [];
  let contadorBlocos = 0;

  async function criarBloco() {
    contadorBlocos++;
    const numero = contadorBlocos;

    const raiz = document.createElement("div");
    raiz.className = "bloco";
    raiz.innerHTML = `
      <div class="bloco-cabecalho">
        <span class="bloco-titulo">Despesa ${numero}</span>
        <button type="button" class="btn-remover-bloco">Remover</button>
      </div>

      <label>Descrição</label>
      <select class="c-descricao" required></select>
      <input type="text" class="c-descricao-novo" placeholder="Digite a nova descrição" style="display:none; margin-top:8px;" />

      <label>Valor</label>
      <input type="text" class="c-valor" inputmode="numeric" value="R$ 0,00" required />

      <label>Forma de pagamento</label>
      <select class="c-forma-pagamento"></select>
      <input type="text" class="c-forma-pagamento-novo" placeholder="Digite a nova forma de pagamento" style="display:none; margin-top:8px;" />

      <label>Data (mês de referência)</label>
      <div class="linha-dupla">
        <select class="c-mes">
          <option value="1">Janeiro</option>
          <option value="2">Fevereiro</option>
          <option value="3">Março</option>
          <option value="4">Abril</option>
          <option value="5">Maio</option>
          <option value="6">Junho</option>
          <option value="7">Julho</option>
          <option value="8">Agosto</option>
          <option value="9">Setembro</option>
          <option value="10">Outubro</option>
          <option value="11">Novembro</option>
          <option value="12">Dezembro</option>
        </select>
        <input type="number" class="c-ano" placeholder="Ano" />
      </div>

      <div class="linha-dupla">
        <div>
          <label>Parcelado?</label>
          <select class="c-parcelado">
            <option value="nao">Não</option>
            <option value="sim">Sim</option>
          </select>
          <input type="number" min="2" class="c-qtd-parcelas" placeholder="Quantas parcelas?" style="display:none; margin-top:8px;" />
        </div>
        <div>
          <label>Status</label>
          <select class="c-status">
            <option value="Pago">Pago</option>
            <option value="Pendente">Pendente</option>
          </select>
        </div>
      </div>

      <label>Do que? <span style="color:var(--muted); font-weight:400;">(assinatura, presente, parcelado...)</span></label>
      <select class="c-do-que"></select>
      <input type="text" class="c-do-que-novo" placeholder="Digite a nova categoria" style="display:none; margin-top:8px;" />

      <label>Observação</label>
      <input type="text" class="c-observacao" placeholder="Opcional" />
    `;

    // Máscara de moeda
    const campoValor = raiz.querySelector(".c-valor");
    function formatarMoeda(digitos) {
      const centavos = parseInt(digitos || "0", 10);
      return (centavos / 100).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }
    function valorEmCentavos(texto) {
      return parseInt((texto.match(/\d/g) || ["0"]).join(""), 10);
    }
    campoValor.addEventListener("input", () => {
      const digitos = campoValor.value.replace(/\D/g, "");
      campoValor.value = formatarMoeda(digitos);
    });

    // Data padrão: mês/ano atuais
    const hoje = new Date();
    raiz.querySelector(".c-mes").value = String(hoje.getMonth() + 1);
    raiz.querySelector(".c-ano").value = String(hoje.getFullYear());

    // Parcelamento
    const campoParcelado = raiz.querySelector(".c-parcelado");
    const campoQtdParcelas = raiz.querySelector(".c-qtd-parcelas");
    campoParcelado.addEventListener("change", (e) => {
      campoQtdParcelas.style.display = e.target.value === "sim" ? "block" : "none";
      if (e.target.value === "sim") campoQtdParcelas.required = true;
      else { campoQtdParcelas.required = false; campoQtdParcelas.value = ""; }
    });

    // Preenche os selects com as opções da planilha
    const opcoes = await garantirOpcoes();
    preencherSelect(raiz.querySelector(".c-descricao"), opcoes.despesas, raiz.querySelector(".c-descricao-novo"), false, "Selecione uma descrição");
    preencherSelect(raiz.querySelector(".c-do-que"), opcoes.doQue, raiz.querySelector(".c-do-que-novo"), true);
    preencherSelect(raiz.querySelector(".c-forma-pagamento"), opcoes.pagamentos, raiz.querySelector(".c-forma-pagamento-novo"));

    // Botão de remover (só funciona se houver mais de um bloco)
    raiz.querySelector(".btn-remover-bloco").addEventListener("click", () => {
      if (blocos.length <= 1) return;
      blocos = blocos.filter((b) => b.raiz !== raiz);
      raiz.remove();
      renumerarBlocos();
    });

    const objetoBloco = {
      raiz,
      obterPayload: () => {
        const { valor: descricao, novaOpcao: novaDescricao } = resolverValorCampo(raiz.querySelector(".c-descricao"), raiz.querySelector(".c-descricao-novo"));
        const { valor: doQue, novaOpcao: novoDoQue } = resolverValorCampo(raiz.querySelector(".c-do-que"), raiz.querySelector(".c-do-que-novo"));
        const { valor: formaPagamento, novaOpcao: novaFormaPagamento } = resolverValorCampo(raiz.querySelector(".c-forma-pagamento"), raiz.querySelector(".c-forma-pagamento-novo"));

        const valorNumerico = valorEmCentavos(campoValor.value) / 100;
        if (!valorNumerico) throw new Error(`O valor da "Despesa ${raiz.querySelector(".bloco-titulo").textContent.replace("Despesa ", "")}" não pode ser zero.`);

        const parcelado = raiz.querySelector(".c-parcelado").value === "sim";
        const parcelas = parcelado ? raiz.querySelector(".c-qtd-parcelas").value : 1;

        const novasOpcoes = [];
        if (novaDescricao) novasOpcoes.push({ campo: "despesas", valor: novaDescricao });
        if (novoDoQue) novasOpcoes.push({ campo: "doQue", valor: novoDoQue });
        if (novaFormaPagamento) novasOpcoes.push({ campo: "pagamentos", valor: novaFormaPagamento });

        return {
          novasOpcoes,
          payload: {
            descricao,
            valor: valorNumerico,
            doQue,
            formaPagamento,
            status: raiz.querySelector(".c-status").value,
            observacao: raiz.querySelector(".c-observacao").value,
            parcelas,
            mesReferencia: raiz.querySelector(".c-mes").value,
            anoReferencia: raiz.querySelector(".c-ano").value,
          },
        };
      },
    };

    blocos.push(objetoBloco);
    blocosContainer.appendChild(raiz);
  }

  function renumerarBlocos() {
    blocos.forEach((b, i) => {
      b.raiz.querySelector(".bloco-titulo").textContent = `Despesa ${i + 1}`;
    });
    contadorBlocos = blocos.length;
  }

  document.getElementById("btn-adicionar").addEventListener("click", () => criarBloco());
  criarBloco();

  const form = document.getElementById("form-despesa");
  const btn = document.getElementById("btn-salvar");
  const mensagem = document.getElementById("mensagem");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true;
    mensagem.textContent = "";
    mensagem.className = "";

    try {
      let salvas = 0;
      const linhasResumo = [];

      for (const bloco of blocos) {
        const { payload, novasOpcoes } = bloco.obterPayload();

        const resp = await fetch("/api/despesa", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!resp.ok) {
          let msg = `Falha ao salvar a despesa ${salvas + 1}.`;
          try { const dados = await resp.json(); if (dados.erro) msg = dados.erro; } catch {}
          throw new Error(msg);
        }

        // Só registra as categorias novas ("Outro") depois que a despesa foi salva de verdade
        for (const nova of novasOpcoes) {
          await fetch("/api/opcoes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(nova),
          });
        }

        const nomeMes = NOMES_MESES[Number(payload.mesReferencia) - 1];
        const parcelaTexto = Number(payload.parcelas) > 1 ? ` — ${payload.parcelas}x` : "";
        linhasResumo.push(`• ${payload.descricao} — R$ ${payload.valor.toFixed(2).replace(".", ",")} (${nomeMes}/${payload.anoReferencia})${parcelaTexto}`);

        salvas++;
      }

      const titulo = salvas > 1 ? `✅ ${salvas} despesas registradas:` : "✅ Despesa registrada:";
      await enviarNotificacaoTelegram(`${titulo}\n\n${linhasResumo.join("\n")}`);

      mostrarConfirmacao(salvas > 1 ? `${salvas} despesas registradas na planilha.` : "Despesa registrada na planilha.");
      btn.disabled = false;
    } catch (err) {
      mensagem.textContent = err.message || "Erro ao salvar as despesas.";
      mensagem.className = "erro";
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
