<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova aplicação</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #1c1c1e;
    --muted: #6b6b6f;
    --border: #e2e2e4;
    --accent: #2f80ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 12px 0 4px; }
  input, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
  }
  p.dica { font-size: 11px; color: var(--muted); margin: 12px 0 0; }
  #btn-salvar {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
  }
  #btn-salvar:disabled { opacity: 0.5; }
  #mensagem { font-size: 13px; margin-top: 10px; text-align: center; }
  #mensagem.erro { color: #d64545; }
  #mensagem.sucesso { color: #2e9e5b; }
</style>
</head>
<body>

<h1>Nova aplicação</h1>

<form id="form-aplicacao">
  <label for="descricao">Descrição</label>
  <select id="descricao" required></select>
  <input type="text" id="descricaoNovo" placeholder="Digite a nova descrição" style="display:none; margin-top:8px;" />

  <label for="instituicao">Instituição</label>
  <select id="instituicao" required></select>
  <input type="text" id="instituicaoNovo" placeholder="Digite a nova instituição" style="display:none; margin-top:8px;" />

  <label for="dataAplicacao">Data de aplicação</label>
  <input type="date" id="dataAplicacao" required />

  <label for="valorComprado">Valor comprado</label>
  <input type="text" inputmode="numeric" id="valorComprado" value="R$ 0,00" required />

  <label for="valorDeCompra">Cotação de compra</label>
  <input type="text" inputmode="numeric" id="valorDeCompra" value="R$ 0,000000" required />

  <label for="valorRecebido">Valor recebido <span style="color:var(--muted); font-weight:400;">(descontando taxas)</span></label>
  <input type="text" inputmode="numeric" id="valorRecebido" value="R$ 0,00" required />

  <button type="submit" id="btn-salvar">Salvar aplicação</button>
  <p id="mensagem"></p>
</form>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const OPCAO_OUTRO = "Outro";

  // Máscara de moeda: mantém só os dígitos digitados e formata como R$ (casasDecimais configurável)
  function ativarMascaraMoeda(campo, casasDecimais = 2) {
    campo.addEventListener("input", () => {
      const digitos = campo.value.replace(/\D/g, "");
      const numero = parseInt(digitos || "0", 10) / Math.pow(10, casasDecimais);
      campo.value = numero.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: casasDecimais,
        maximumFractionDigits: casasDecimais,
      });
    });
  }
  function valorEmUnidade(texto, casasDecimais = 2) {
    const digitos = (texto.match(/\d/g) || ["0"]).join("");
    return parseInt(digitos, 10) / Math.pow(10, casasDecimais);
  }

  const campoValorComprado = document.getElementById("valorComprado");
  const campoValorDeCompra = document.getElementById("valorDeCompra");
  const campoValorRecebido = document.getElementById("valorRecebido");
  ativarMascaraMoeda(campoValorComprado);
  ativarMascaraMoeda(campoValorDeCompra, 6);
  ativarMascaraMoeda(campoValorRecebido);

  // Pré-preenche a data de hoje como padrão
  document.getElementById("dataAplicacao").value = new Date().toISOString().slice(0, 10);

  function preencherSelect(select, lista, inputNovo, placeholder = null) {
    select.innerHTML = "";

    if (placeholder) {
      const optPlaceholder = document.createElement("option");
      optPlaceholder.value = "";
      optPlaceholder.textContent = placeholder;
      optPlaceholder.disabled = true;
      optPlaceholder.selected = true;
      optPlaceholder.hidden = true;
      select.appendChild(optPlaceholder);
    }

    for (const item of lista) {
      const opt = document.createElement("option");
      opt.value = item;
      opt.textContent = item;
      select.appendChild(opt);
    }
    const optOutro = document.createElement("option");
    optOutro.value = OPCAO_OUTRO;
    optOutro.textContent = "Outro...";
    select.appendChild(optOutro);

    select.addEventListener("change", () => {
      inputNovo.style.display = select.value === OPCAO_OUTRO ? "block" : "none";
    });
  }

  async function carregarOpcoes() {
    const resp = await fetch("/api/opcoes");
    const dados = await resp.json();
    preencherSelect(document.getElementById("descricao"), dados.aplicacao, document.getElementById("descricaoNovo"), "Selecione uma descrição");
    preencherSelect(document.getElementById("instituicao"), dados.instituicao, document.getElementById("instituicaoNovo"), "Selecione uma instituição");
  }
  carregarOpcoes();

  async function resolverValorCampo(selectId, inputNovoId, campoDescricoes) {
    const select = document.getElementById(selectId);
    if (select.value !== OPCAO_OUTRO) return select.value;

    const novoValor = document.getElementById(inputNovoId).value.trim();
    if (!novoValor) throw new Error("Preencha o campo novo antes de salvar.");

    await fetch("/api/opcoes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ campo: campoDescricoes, valor: novoValor }),
    });

    return novoValor;
  }

  const form = document.getElementById("form-aplicacao");
  const btn = document.getElementById("btn-salvar");
  const mensagem = document.getElementById("mensagem");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    btn.disabled = true;
    mensagem.textContent = "";
    mensagem.className = "";

    try {
      const descricao = await resolverValorCampo("descricao", "descricaoNovo", "aplicacao");
      const instituicao = await resolverValorCampo("instituicao", "instituicaoNovo", "instituicao");

      const payload = {
        descricao,
        instituicao,
        dataAplicacao: document.getElementById("dataAplicacao").value,
        valorComprado: valorEmUnidade(campoValorComprado.value),
        valorDeCompra: valorEmUnidade(campoValorDeCompra.value, 6),
        valorRecebido: valorEmUnidade(campoValorRecebido.value),
      };

      const resp = await fetch("/api/aplicacao", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!resp.ok) throw new Error("Falha ao salvar.");

      mensagem.textContent = "Aplicação registrada na planilha ✓";
      mensagem.className = "sucesso";

      setTimeout(() => { if (tg) tg.close(); }, 1200);
    } catch (err) {
      mensagem.textContent = err.message || "Erro ao salvar a aplicação.";
      mensagem.className = "erro";
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
